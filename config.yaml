home_assistant:
  url: "http://localhost:8123"
  # Генерується в HA: Profile → Long-Lived Access Tokens → Create Token
  token: "your-token"

scraper:
  url: "https://poweron.loe.lviv.ua"
  # Як часто перевіряти сайт (хвилини)
  interval_minutes: 10
  # Куди зберігати JSON файл (абсолютний шлях)
  json_output: "power_outages.json"
